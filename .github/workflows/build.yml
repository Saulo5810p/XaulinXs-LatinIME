name: Build

on:
  push:
    branches: [ gradle-modernization, main ]
  pull_request:
    branches: [ gradle-modernization, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Versões fixadas de propósito: NDK e CMake não devem seguir "latest",
      # para que o build não quebre silenciosamente quando a imagem
      # ubuntu-latest trocar de versão padrão no futuro.
      NDK_VERSION: "25.2.9519653"
      CMAKE_VERSION: "3.22.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }} and CMake ${{ env.CMAKE_VERSION }}
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          sdkmanager --install "cmake;${CMAKE_VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latinime-debug-apk
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
