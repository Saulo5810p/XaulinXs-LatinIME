name: Build

on:
  push:
    branches: [ gradle-modernization, main ]
  pull_request:
    branches: [ gradle-modernization, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Versões fixadas de propósito: NDK e CMake não devem seguir "latest",
      # para que o build não quebre silenciosamente quando a imagem
      # ubuntu-latest trocar de versão padrão no futuro.
      # NDK 28.2.13676358 é a versão padrão esperada pelo AGP 9.1.0.
      NDK_VERSION: "28.2.13676358"
      CMAKE_VERSION: "3.22.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform, NDK ${{ env.NDK_VERSION }} and CMake ${{ env.CMAKE_VERSION }}
        run: |
          sdkmanager --install "platforms;android-36"
          sdkmanager --install "build-tools;36.0.0"
          sdkmanager --install "ndk;${NDK_VERSION}"
          sdkmanager --install "cmake;${CMAKE_VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clear any stale Gradle cache
        run: rm -rf ~/.gradle/wrapper ~/.gradle/caches
        # Precaução geral para garantir download limpo do Gradle/AGP nesta
        # execução (não é mais a causa raiz suspeita — ver histórico do
        # projeto: a causa real do erro BuildCompletionListener foi a
        # combinação legada AGP 8.7/Gradle 8.9, resolvida migrando para o
        # par atual AGP 9.1.0 + Gradle 9.1.0, que é o par oficialmente
        # suportado neste momento).

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --refresh-dependencies --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latinime-debug-apk
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
